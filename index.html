<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Mapa Operacional V2 - Cisternas Bayamón</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/><link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/><link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/><link rel="stylesheet" href="styles.css"></head><body><div id="layout"><aside id="panel"><div class="brand"><div class="badge">V2</div><h1>Mapa Operacional de Cisternas</h1><p>Bayamón · Vista limpia por prioridad, sector y estado.</p></div><section class="card"><h2>Resumen visible</h2><div class="grid"><div><strong id="totalVisible">0</strong><span>Total</span></div><div><strong id="pendientes">0</strong><span>Pendientes</span></div><div><strong id="enRuta">0</strong><span>En ruta</span></div><div><strong id="entregadas">0</strong><span>Entregadas</span></div></div></section><section class="card"><h2>Filtros</h2><label>Buscar</label><input id="q" placeholder="PIN, nombre, teléfono, sector o dirección"><label>Categoría</label><div class="checks"><label><input type="checkbox" class="cat" value="Impedimento / encamados" checked><i class="red"></i> Impedimento / encamados</label><label><input type="checkbox" class="cat" value="Mayores de 60 años" checked><i class="orange"></i> Mayores de 60 años</label><label><input type="checkbox" class="cat" value="Hogares con niños" checked><i class="blue"></i> Hogares con niños</label><label><input type="checkbox" class="cat" value="Otros registros" checked><i class="gray"></i> Otros registros</label></div><label>Sector</label><select id="sector"><option value="">Todos los sectores</option></select><label>Estado</label><select id="estado"><option value="">Todos</option><option>Pendiente</option><option>En ruta</option><option>Entregada</option><option>No localizado</opti
